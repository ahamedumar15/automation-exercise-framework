[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Console output options
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    -n auto
    --maxfail=5

# Markers
markers =
    smoke: Smoke tests (quick sanity checks)
    regression: Regression tests (comprehensive testing)
    sanity: Sanity tests (basic functionality)
    e2e: End-to-end tests (complete user workflows)

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (if pytest-cov is installed)
# addopts = --cov=pages --cov=utilities --cov-report=html

# Timeout for tests (if pytest-timeout is installed)
# timeout = 300